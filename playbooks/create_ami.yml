---
# ✅ PLAY 1
- name: Fetch ServiceNow Data
  hosts: ec2_host
  gather_facts: false

  vars_files:
    - ../vars/vars.yml

  tasks:
    - include_tasks: ../tasks/fetch_servicenow.yml


# ✅ PLAY 2
- name: Create AMI
  hosts: ec2_host
  gather_facts: false

  tasks:

    - name: Generate unique AMI name
      set_fact:
        final_ami_name: "{{ ami_name }}-{{ lookup('pipe','date +%Y%m%d%H%M%S') }}"

    # ✅ MAIN TASK (NO IGNORE — DEBUG MODE)
    - name: Create AMI
      amazon.aws.ec2_ami:
        instance_id: "{{ instance_id }}"
        name: "{{ final_ami_name }}"
        region: "{{ region }}"
        wait: yes
        no_reboot: false
      register: ami_output

    # ✅ DEBUG EVERYTHING (IMPORTANT)
    - name: Show AWS full error (clean)
      debug:
        msg:
          - "FAILED: {{ ami_output.failed | default('N/A') }}"
          - "MSG: {{ ami_output.msg | default('N/A') }}"
          - "EXCEPTION: {{ ami_output.exception | default('N/A') }}"

    - name: Print raw output
      debug:
        var: ami_output

    # ✅ Extract AMI ID
    - name: Extract AMI ID
      set_fact:
        ami_id: "{{ ami_output.image_id }}"
      when: ami_output.failed is not defined or not ami_output.failed

    # ✅ Set Status
    - name: Set Status
      set_fact:
        ami_status: "{{ 'success' if (ami_output.failed is not defined or not ami_output.failed) else 'failed' }}"

    - name: Debug output
      debug:
        msg:
          - "AMI Name: {{ final_ami_name }}"
          - "Status: {{ ami_status }}"
          - "AMI ID: {{ ami_id | default('N/A') }}"


# ✅ PLAY 3
- name: Update ServiceNow
  hosts: ec2_host
  gather_facts: false

  vars_files:
    - ../vars/vars.yml

  tasks:
    - include_tasks: ../tasks/update_servicenow.yml
